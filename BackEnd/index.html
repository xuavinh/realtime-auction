<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test CORS</title>
</head>
<body>
    <h1>Test CORS API</h1>
    <script>

        async function callApi() {
            try {
                const response = await fetch('http://192.168.209.138:8080/api/v1/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'user@example.com',
                        password: 'Pjdlfj6348./assword',
                        full_name: "John Doe"
                    })
                });
                const data = await response.json();
                console.log('API Response:', data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        callApi();
    </script>
</body>
</html>
