services: 
  database:
    image:  postgres:alpine3.23
    container_name: postgresql-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - app-network

  redis:
    image: redis:8.0-alpine
    container_name: redis-db
    restart: unless-stopped
    environment:
      TZ: UTC
    volumes:
      - redis-data:/data
      - ./system/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    networks:
      - app-network
    
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realtime-auction-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - app-logs:/app/logs
      - app-uploads:/app/uploads
    depends_on:
      - database
      - redis
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:
  app-logs:
  app-uploads:

networks:
  app-network:
    driver: bridge